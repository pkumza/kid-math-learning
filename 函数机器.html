<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>函数机器 · 数学小课堂</title><style>
:root{--blue:#2563EB;--orange:#EA580C;--green:#16A34A;--purple:#7C3AED;--red:#B91C1C;--ink:#1F2937;--soft:#6B7280;--card:#fff}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Hiragino Sans GB","Helvetica Neue",sans-serif;color:var(--ink);background:linear-gradient(160deg,#EAF4FF 0%,#FFF6EC 58%,#FDEFF6 100%);min-height:100vh;overflow-x:hidden;user-select:none}.wrap{max-width:760px;margin:0 auto;padding:10px 14px 40px}header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 6px}.brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1.15rem}.brand .fox{font-size:1.6rem}.brand small{color:var(--soft);font-weight:600;font-size:.78rem}.tools{display:flex;gap:8px}.icon-btn{border:none;background:#fff;border-radius:14px;width:44px;height:44px;font-size:1.25rem;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.08);transition:transform .1s}.icon-btn:active{transform:scale(.92)}.steps{display:flex;gap:6px;justify-content:center;margin:4px 0 12px;flex-wrap:wrap}.pill{font-size:.82rem;font-weight:800;color:var(--soft);background:#fff;padding:5px 12px;border-radius:999px;box-shadow:0 2px 5px rgba(0,0,0,.05);white-space:nowrap;transition:transform .1s,opacity .2s}.pill.active{color:#fff;background:var(--purple);box-shadow:0 4px 10px rgba(124,58,237,.35)}.pill.nav-on{cursor:pointer}.pill.nav-on:active{transform:scale(.93)}.pill.nav-locked{opacity:.45}.screen{display:none;animation:pop .35s ease both}.screen.on{display:block}@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}.card{background:var(--card);border-radius:26px;padding:22px 18px;box-shadow:0 12px 30px rgba(80,90,130,.12);margin-bottom:16px}h1{font-size:1.7rem;margin:.1em 0 .2em;text-align:center}h2{font-size:1.25rem;margin:.1em 0 .5em;text-align:center;color:var(--purple)}.lead{text-align:center;color:var(--soft);font-size:1rem;line-height:1.7;margin:.3em 0 .2em}.pinyin{display:block;color:var(--soft);font-size:.95rem;font-weight:600;text-align:center}.hard-banner{display:inline-flex;background:#FEE2E2;color:#B91C1C;font-weight:900;padding:7px 14px;border-radius:999px;margin:4px auto 8px}.center{text-align:center}.big-btn{display:block;width:100%;border:none;cursor:pointer;font-size:1.3rem;font-weight:900;color:#fff;padding:16px;border-radius:20px;margin-top:10px;background:linear-gradient(135deg,#34D399,#10B981);box-shadow:0 8px 18px rgba(16,185,129,.35);transition:transform .12s,filter .2s}.big-btn.purple{background:linear-gradient(135deg,#A78BFA,#7C3AED)}.big-btn.orange{background:linear-gradient(135deg,#FDBA74,#F97316)}.big-btn:active{transform:translateY(2px) scale(.99)}.big-btn:disabled{filter:grayscale(.7) opacity(.55);cursor:not-allowed;box-shadow:none}.big-btn.ready{animation:bounce 1s infinite}@keyframes bounce{0%,100%{transform:none}50%{transform:translateY(-5px)}}.partbox{margin:10px 0 4px;padding:14px 12px;border-radius:20px;background:#F8FAFF;border:2px dashed #DBE3F4}.part-title{text-align:center;font-weight:900;color:var(--purple);font-size:1.08rem;margin-bottom:8px}.demo{background:#fff;border:3px solid #E5E7EB;border-radius:20px;padding:16px;text-align:center;font-size:1.45rem;font-weight:900;line-height:1.5;box-shadow:0 5px 12px rgba(0,0,0,.06)}.choice-row,.options{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:12px}.mini-btn,.opt{border:none;cursor:pointer;font-weight:900;border-radius:18px;background:#fff;color:var(--ink);box-shadow:0 5px 12px rgba(0,0,0,.1);border:3px solid #E5E7EB;transition:transform .1s}.mini-btn{font-size:1.15rem;padding:12px 18px}.opt{min-width:92px;font-size:1.25rem;padding:14px 10px}.mini-btn:active,.opt:active{transform:scale(.95)}.opt.correct,.mini-btn.good{background:var(--green);color:#fff;border-color:var(--green)}.opt.wrong{background:#FCA5A5;border-color:#EF4444;animation:shake .35s}@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.note{margin-top:12px;background:#FFFDF5;border-radius:14px;padding:12px 14px;color:#92400E;font-weight:800;line-height:1.6;font-size:1.02rem;text-align:center;min-height:1.5em}.unlock{text-align:center;font-weight:900;color:var(--purple);margin:12px 0 4px;min-height:1.4em}.level-tag{text-align:center;color:var(--soft);font-weight:900;margin-bottom:4px}.q-hint{text-align:center;color:var(--orange);font-weight:900;font-size:1.02rem;min-height:1.3em;margin:6px 0}.ask{text-align:center;font-size:1.35rem;font-weight:900;margin:10px 0 8px;line-height:1.45}.feedback{text-align:center;font-weight:900;font-size:1.25rem;min-height:1.5em;margin-top:12px}.gr{color:var(--green)}.or{color:var(--orange)}.stars{font-size:1.55rem;letter-spacing:6px;text-align:center}.badge{font-size:4.5rem;text-align:center;animation:spin 3s linear infinite}@keyframes spin{from{transform:rotate(-8deg)}50%{transform:rotate(8deg)}to{transform:rotate(-8deg)}}.trophy-name{text-align:center;font-size:1.5rem;font-weight:900;color:var(--purple);margin:6px 0}details{margin-top:10px;background:#F8FAFF;border-radius:16px;padding:4px 14px}summary{cursor:pointer;font-weight:900;color:var(--purple);padding:10px 0;list-style:none}summary::-webkit-details-marker{display:none}details p{color:#374151;line-height:1.75;font-size:.95rem}#confetti{position:fixed;inset:0;pointer-events:none;display:none;z-index:99}.hint-btn{border:none;cursor:pointer;font-weight:900;font-size:1rem;color:#fff;background:linear-gradient(135deg,#FDBA74,#F97316);padding:8px 16px;border-radius:999px;box-shadow:0 4px 10px rgba(249,115,22,.25)}.hint-btn:active{transform:scale(.95)}.hint-text{display:inline-block;color:var(--orange)}.hint-text[hidden]{display:none}
</style></head><body><canvas id="confetti"></canvas><div class="wrap"><header><div class="brand"><span class="fox">🦊</span><div>数学王国<br><small>函数机器</small></div></div><div class="tools"><button class="icon-btn" id="homeBtn" title="回家">🏠</button><button class="icon-btn" id="muteBtn" title="声音开关">🔊</button></div></header><div class="steps"><span class="pill" data-step="1">① 猜机器</span><span class="pill" data-step="2">② 闯关</span><span class="pill" data-step="3">③ 完成</span></div><section class="screen on" id="welcome"><div class="card"><div class="center"></div><div style="font-size:3.4rem;text-align:center">🤖</div><h1>函数机器</h1><span class="pinyin">hán shù jī qì · 进去一个数，出来一个数</span><p class="lead">机器有自己的规则。<br>看输入和输出，猜出机器做了什么。</p><button class="big-btn" id="startBtn">开始探索 →</button><details><summary>👨‍👩‍👧 给爸爸妈妈的话（点开）</summary><p>这一关继续沿着代数启蒙路线走，鼓励孩子先说思路，再点选答案。提示默认隐藏，孩子需要时再点开。</p></details></div></section><section class="screen" id="learn"><div class="card"><h2>🤖 猜机器 · 输入 3 输出 8</h2><div class="partbox"><div class="part-title">先看一个例子</div><div class="demo">输入 3 输出 8，输入 5 输出 12。机器做了什么？</div><div class="choice-row"><button class="mini-btn" id="demoBtn">×2+2</button></div><div class="note" id="demoNote">每次都是先乘 2，再加 2。</div></div><div class="unlock" id="unlock"></div><button class="big-btn purple" id="toPractice" disabled>去闯关 →</button></div></section><section class="screen" id="practice"><div class="card"><div class="level-tag" id="levelTag">第 1 / 6 关</div><div class="q-hint" id="qHint"></div><div class="ask" id="ask"></div><div class="options" id="options"></div><div class="feedback" id="feedback"></div><button class="big-btn" id="nextLevel" style="display:none">下一关 →</button></div></section><section class="screen" id="done"><div class="card"><div class="badge">🎖️</div><h1>太厉害啦！</h1><div class="trophy-name">🎖️ 函数机器小达人</div><p class="lead">你能从输入输出里猜出机器规则啦！</p><button class="big-btn" onclick="try{speechSynthesis.cancel()}catch(e){};location.href='代数闯关Boss.html'">进入下一关 →</button><button class="big-btn orange" id="again">再玩一次 🔁</button></div></section></div><script>
"use strict";function setQHint(text){const el=document.getElementById('qHint');if(!el)return;const hint=String(text||'').replace(/^💡\s*/,'');el.innerHTML='';const btn=document.createElement('button');btn.type='button';btn.className='hint-btn';btn.textContent='💡 提示';const span=document.createElement('span');span.className='hint-text';span.hidden=true;span.textContent='💡 '+hint;btn.addEventListener('click',()=>{btn.hidden=true;span.hidden=false;if(typeof say==='function')say(hint);});el.appendChild(btn);el.appendChild(span);}const $=(s,el=document)=>el.querySelector(s),$$=(s,el=document)=>[...el.querySelectorAll(s)];let muted=false,audioCtx=null;function ac(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return audioCtx;}function beep(freq,dur,type,vol,when){if(muted)return;const c=ac();if(!c)return;const t=c.currentTime+(when||0),o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.15,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g).connect(c.destination);o.start(t);o.stop(t+dur+0.02);}const sClick=()=>beep(680,0.06,'triangle',0.12,0),sGood=()=>[523,659,784].forEach((f,i)=>beep(f,0.12,'sine',0.16,i*0.09)),sWin=()=>[523,659,784,1047,1319].forEach((f,i)=>beep(f,0.16,'sine',0.18,i*0.12)),sBad=()=>beep(190,0.2,'sawtooth',0.1,0);let zhVoice=null;function pickVoice(){if(!('speechSynthesis'in window))return;const vs=speechSynthesis.getVoices();if(!vs||!vs.length)return;const zh=vs.filter(v=>/zh|cmn|chinese|普通话|国语|中文/i.test((v.lang||'')+' '+(v.name||'')));zhVoice=zh.find(v=>/zh[-_]?CN/i.test(v.lang))||zh[0]||null;}if('speechSynthesis'in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;setTimeout(pickVoice,300);}function normalizeSpeechText(text){return String(text).replace(/□/g,'空格').replace(/=/g,'等于').replace(/\+/g,'加').replace(/×/g,'乘').replace(/÷/g,'除以').replace(/−/g,'减').replace(/[↩️📦🔁🔷🤖🏰🏆🎖️🎉⭐👇]/g,'').replace(/\s+/g,' ').trim();}function say(text){if(muted||!('speechSynthesis'in window))return;try{if(!zhVoice)pickVoice();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(normalizeSpeechText(text)+'。');u.lang='zh-CN';if(zhVoice)u.voice=zhVoice;u.rate=0.95;u.pitch=1.08;speechSynthesis.speak(u);}catch(e){}}function show(id,step){$$('.screen').forEach(s=>s.classList.remove('on'));$('#'+id).classList.add('on');$$('.pill').forEach(p=>p.classList.toggle('active',+p.dataset.step===step));window.scrollTo({top:0,behavior:'smooth'});}const LEVELS=[{"q":"机器：输入 4 输出 9，输入 6 输出 11。规则是什么？","ans":"+5","opts":["+3","+5","×2"],"hint":"输出比输入多 5。"},{"q":"规则是 ×2，输入 7 输出多少？","ans":"14","opts":["9","14","72"],"hint":"7 乘 2。"},{"q":"规则是 +3 再 ×2，输入 4 输出多少？","ans":"14","opts":["11","14","20"],"hint":"先 4 加 3 得 7，再乘 2。"},{"q":"输入 2 输出 7，输入 5 输出 13。规则是什么？","ans":"×2+3","opts":["+5","×2+3","×3+1"],"hint":"2 乘 2 加 3 是 7。"},{"q":"规则是 ×3−1，输入 6 输出多少？","ans":"17","opts":["15","17","18"],"hint":"6 乘 3 是 18，再减 1。"},{"q":"机器输出 20，规则是 ×4，输入是多少？","ans":"5","opts":["4","5","8"],"hint":"反着想，20 除以 4。"}];let pi=0,answered=false;function startPractice(){pi=0;answered=false;show('practice',2);renderLevel();}function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}function renderLevel(){const P=LEVELS[pi];answered=false;$('#levelTag').textContent='第 '+(pi+1)+' / '+LEVELS.length+' 关';setQHint(P.hint);$('#ask').textContent=P.q+' 👇';$('#feedback').textContent='';$('#nextLevel').style.display='none';const box=$('#options');box.innerHTML='';shuffle(P.opts.slice()).forEach(v=>{const btn=document.createElement('button');btn.className='opt';btn.textContent=v;btn.addEventListener('click',()=>choose(btn,v,P.ans));box.appendChild(btn);});say(P.q);}function choose(btn,v,ans){if(answered)return;if(v===ans){answered=true;btn.classList.add('correct');sGood();$('#feedback').innerHTML='<span class="gr">答对啦！🎉</span><div class="stars">⭐⭐⭐</div>';say('答对啦。');$$('.opt').forEach(o=>o.disabled=true);$('#nextLevel').textContent=pi<LEVELS.length-1?'下一关 →':'完成啦 🎉';$('#nextLevel').style.display='block';}else{btn.classList.add('wrong');sBad();$('#feedback').innerHTML='<span class="or">再想想～ '+LEVELS[pi].hint+'</span>';say('再想想，'+LEVELS[pi].hint);setTimeout(()=>btn.classList.remove('wrong'),400);}}$('#nextLevel').addEventListener('click',()=>{sClick();if(pi===LEVELS.length-1)finish();else{pi++;renderLevel();}});function confetti(){const cv=$('#confetti'),ctx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;cv.style.display='block';const colors=['#2563EB','#F97316','#16A34A','#EAB308','#EC4899','#7C3AED'];const P=[];for(let i=0;i<150;i++)P.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*.28,vx:(Math.random()-.5)*13,vy:Math.random()*-13-3,g:.32,s:7+Math.random()*9,c:colors[i%colors.length],rot:Math.random()*6,vr:(Math.random()-.5)*.4});let t=0;(function anim(){t++;ctx.clearRect(0,0,cv.width,cv.height);P.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();});if(t<150)requestAnimationFrame(anim);else cv.style.display='none';})();}function finish(){show('done',3);sWin();say('太厉害啦，你已经是函数机器小达人啦。');confetti();}function resetAll(){pi=0;answered=false;$('#toPractice').disabled=true;$('#toPractice').classList.remove('ready');$('#unlock').textContent='';$('#demoNote').textContent='每次都是先乘 2，再加 2。';}$('#startBtn').addEventListener('click',()=>{ac();sClick();show('learn',1);say('函数机器，先看一个例子。');});$('#demoBtn').addEventListener('click',()=>{sClick();sGood();$('#demoBtn').classList.add('good');$('#demoNote').textContent='对啦，可以去闯关了！';$('#unlock').textContent='🎉 准备好了！';$('#toPractice').disabled=false;$('#toPractice').classList.add('ready');say($('#demoNote').textContent);});$('#toPractice').addEventListener('click',()=>{sClick();startPractice();});$('#again').addEventListener('click',()=>{sClick();resetAll();show('learn',1);say('我们再玩一次函数机器。');});$('#muteBtn').addEventListener('click',()=>{muted=!muted;$('#muteBtn').textContent=muted?'🔇':'🔊';if(muted&&'speechSynthesis'in window)speechSynthesis.cancel();else sClick();});$('#homeBtn').addEventListener('click',()=>{sClick();if('speechSynthesis'in window)speechSynthesis.cancel();location.href='index.html';});resetAll();(function(){var pills=[].slice.call(document.querySelectorAll('.pill'));var maxStep=0,lastStep=3,_show=show;show=function(id,step){_show(id,step);if(typeof step==='number'){if(step>maxStep)maxStep=step;sync();}};function sync(){pills.forEach(function(p){var s=+p.dataset.step;p.classList.toggle('nav-on',s<=maxStep);p.classList.toggle('nav-locked',s>maxStep);});}function go(s){if(s>maxStep)return;if(s===1)show('learn',1);else if(s===2)startPractice();else if(s===lastStep)show('done',lastStep);}pills.forEach(function(p){p.addEventListener('click',function(){go(+p.dataset.step);});});sync();})();(function(){var ID='jiqi59';try{var done=document.getElementById('done');if(done){var mark=function(){if(done.classList.contains('on')){try{localStorage.setItem('yswg:done:'+ID,'1');}catch(e){}}};new MutationObserver(mark).observe(done,{attributes:true,attributeFilter:['class']});mark();}}catch(e){}})();
</script></body></html>
